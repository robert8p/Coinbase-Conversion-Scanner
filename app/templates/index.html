<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coinbase Crypto Prob Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-7xl mx-auto p-6 space-y-6">
    <h1 class="text-2xl font-bold">Coinbase Crypto Prob Scanner</h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
      <div class="bg-white p-4 rounded shadow"><div>Data source: <span id="sourceStatus">—</span></div><div>Model: <span id="modelStatus">—</span></div><div>Last bar: <span id="lastBar">—</span></div></div>
      <div class="bg-white p-4 rounded shadow"><div>Coverage: <span id="coverageStatus">—</span></div><div>Tail counts: <span id="tailCounts">—</span></div><div>Skips: <span id="skipReasons">—</span></div></div>
      <div class="bg-white p-4 rounded shadow"><div>Training: <span id="trainRunning">—</span></div><input id="adminPassword" class="border rounded p-1 w-full my-2" type="password" placeholder="Admin password"/><button id="startTraining" class="bg-slate-900 text-white px-3 py-1 rounded">Start training</button></div>
    </div>
    <div class="bg-white p-4 rounded shadow">
      <table class="w-full text-sm">
        <thead><tr class="text-left border-b"><th>Symbol</th><th>Price</th><th>Prob 2%</th><th>Risk</th><th>Risk reason</th><th>Downside</th><th>Uncertainty</th><th>BTC-rel</th><th>Reasons</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
